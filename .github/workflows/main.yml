name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # hamropatro.com uses Cloudflare bot protection that may return 403 on
    # CI runners. Tests are written to accept 403 as a valid reachability
    # response. UI tests require running locally with a real browser.
    - name: Run API tests
      run: npx playwright test tests/api.spec.js --project chromium
    - name: Run performance tests
      run: npx playwright test tests/performance.spec.js --project chromium
    - uses: actions/upload-artifact@v4
      if: always()
      with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
