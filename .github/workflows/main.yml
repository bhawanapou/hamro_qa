name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # API and performance tests run reliably on CI (no Cloudflare challenge).
    # UI tests (homepage, calendar, search, etc.) require running locally
    # because hamropatro.com uses Cloudflare bot protection that blocks
    # headless browsers in CI environments.
    - name: Run API tests
      run: npx playwright test tests/api.spec.js --project chromium
    - name: Run performance tests
      run: npx playwright test tests/performance.spec.js --project chromium
    - uses: actions/upload-artifact@v4
      if: always()
      with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
